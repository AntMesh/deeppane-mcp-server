name: Publish MCP package

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: mcp-release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Install npm with trusted publishing support
        run: npm install --global npm@12.0.1 && npm --version
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Verify tag and package versions
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          test "$VERSION" = "$(node -p "require('./package.json').version")"
          test "$VERSION" = "$(node -p "require('./server.json').version")"
      - run: npm test
      - run: npm run check:clean-install
      - name: Publish npm package
        run: npm publish --provenance --access public
      - name: Verify public npm installation after registry propagation
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in $(seq 1 11); do
            CACHE_DIR="$(mktemp -d)"
            if npm view "@deeppane/mcp-server@$VERSION" version \
              --cache "$CACHE_DIR" --prefer-online --fetch-retries=0; then
              INSTALL_DIR="$(mktemp -d)"
              printf '{"private":true}\n' > "$INSTALL_DIR/package.json"
              npm install "@deeppane/mcp-server@$VERSION" \
                --prefix "$INSTALL_DIR" --cache "$CACHE_DIR" --prefer-online \
                --fetch-retries=0 --ignore-scripts --no-audit --no-fund
              DEEPPANE_MCP_SERVER_PATH="$INSTALL_DIR/node_modules/@deeppane/mcp-server/bin/deeppane-mcp.js" \
                DEEPPANE_MCP_EXPECTED_VERSION="$VERSION" \
                node scripts/smoke-stdio.mjs
              rm -rf "$CACHE_DIR" "$INSTALL_DIR"
              exit 0
            fi
            rm -rf "$CACHE_DIR"
            if [ "$attempt" -lt 11 ]; then sleep 60; fi
          done
          exit 1
