name: Publish MCP Registry metadata

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    environment: mcp-release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm test
      - name: Verify the referenced npm package is public
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./server.json').packages[0].version")"
          test "$PACKAGE_VERSION" = "$(node -p "require('./server.json').version")"
          npm view "@deeppane/mcp-server@$PACKAGE_VERSION" version
      - name: Install MCP publisher
        shell: bash
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login dns --domain deeppane.com --private-key "${{ secrets.MCP_PRIVATE_KEY }}"
      - name: Publish Registry metadata
        run: ./mcp-publisher publish
